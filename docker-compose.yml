version: "3.9"

networks:
  mm-network:
    driver: bridge

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────────

  postgres-txn:
    image: postgres:16-alpine
    container_name: postgres-txn
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: txn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_txn_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d txn_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mm-network

  postgres-budget:
    image: postgres:16-alpine
    container_name: postgres-budget
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: budget_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_budget_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d budget_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mm-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/9092' && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mm-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mm-network

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - mm-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3200:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - mm-network

  # ─── NestJS Services ──────────────────────────────────────────────────────────

  transaction-service:
    build:
      context: .
      target: dev
    container_name: transaction-service
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      PORT: 3001
    volumes:
      - ./services/transaction-service/src:/app/src
    depends_on:
      postgres-txn:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mm-network

  budget-service:
    build:
      context: .
      target: dev
    container_name: budget-service
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      PORT: 3002
    volumes:
      - ./services/budget-service/src:/app/src
    depends_on:
      postgres-budget:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mm-network

  ai-service:
    build:
      context: .
      target: dev
    container_name: ai-service
    ports:
      - "3003:3003"
    env_file: .env
    environment:
      PORT: 3003
    volumes:
      - ./services/ai-service/src:/app/src
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mm-network

  worker-service:
    build:
      context: .
      target: dev
    container_name: worker-service
    env_file: .env
    volumes:
      - ./services/worker-service/src:/app/src
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres-txn:
        condition: service_healthy
      postgres-budget:
        condition: service_healthy
    networks:
      - mm-network

  gateway:
    build:
      context: .
      target: dev
    container_name: gateway
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      PORT: 3000
    volumes:
      - ./services/gateway/src:/app/src
    depends_on:
      postgres-txn:
        condition: service_healthy
      postgres-budget:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      transaction-service:
        condition: service_started
      budget-service:
        condition: service_started
      ai-service:
        condition: service_started
      worker-service:
        condition: service_started
    networks:
      - mm-network

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - gateway
    networks:
      - mm-network

volumes:
  postgres_txn_data:
  postgres_budget_data:
  redis_data:
  loki_data:
  grafana_data:
