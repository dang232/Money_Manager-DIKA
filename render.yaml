services:
  - type: web
    name: mm-gateway
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter gateway build
    startCommand: node services/gateway/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BUS_ADAPTER
        value: redis-streams
      - key: REDIS_URL
        fromService:
          type: redis
          name: mm-redis
          property: connectionString
      - key: TRANSACTION_SERVICE_URL
        value: https://mm-transaction.onrender.com
      - key: BUDGET_SERVICE_URL
        value: https://mm-budget.onrender.com
      - key: AI_SERVICE_URL
        value: https://mm-ai.onrender.com

  - type: web
    name: mm-transaction
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter transaction-service build
    startCommand: node services/transaction-service/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BUS_ADAPTER
        value: redis-streams
      - key: REDIS_URL
        fromService:
          type: redis
          name: mm-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mm-postgres
          property: connectionString

  - type: web
    name: mm-budget
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter budget-service build
    startCommand: node services/budget-service/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BUS_ADAPTER
        value: redis-streams
      - key: REDIS_URL
        fromService:
          type: redis
          name: mm-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mm-postgres
          property: connectionString

  - type: web
    name: mm-ai
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter ai-service build
    startCommand: node services/ai-service/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BUS_ADAPTER
        value: redis-streams
      - key: REDIS_URL
        fromService:
          type: redis
          name: mm-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mm-postgres
          property: connectionString
      - key: GROQ_API_KEY
        sync: false

  - type: worker
    name: mm-worker
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter worker-service build
    startCommand: node services/worker-service/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_BUS_ADAPTER
        value: redis-streams
      - key: REDIS_URL
        fromService:
          type: redis
          name: mm-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: mm-postgres
          property: connectionString

  - type: web
    name: mm-frontend
    env: static
    plan: free
    buildCommand: cd frontend && pnpm install && pnpm build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mm-postgres
    plan: free
    databaseName: money_manager
    user: mm_user

  - name: mm-redis
    plan: free
