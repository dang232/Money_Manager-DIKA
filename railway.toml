[build]
builder = "nixpacks"
nixpacksVersion = "0.26.0"

# Per-service overrides via Railway's build path configuration
# Note: Railway monorepo support requires each service to have its own Dockerfile
# in the specified root directory

[[build]]
service = "gateway"
builder = "dockerfile"
dockerfile = "services/gateway/Dockerfile"

[[build]]
service = "transaction-service"
builder = "dockerfile"
dockerfile = "services/transaction-service/Dockerfile"

[[build]]
service = "budget-service"
builder = "dockerfile"
dockerfile = "services/budget-service/Dockerfile"

[[build]]
service = "ai-service"
builder = "dockerfile"
dockerfile = "services/ai-service/Dockerfile"

[[build]]
service = "auth-service"
builder = "dockerfile"
dockerfile = "services/auth-service/Dockerfile"

[[build]]
service = "user-service"
builder = "dockerfile"
dockerfile = "services/user-service/Dockerfile"

[[build]]
service = "worker-service"
builder = "dockerfile"
dockerfile = "services/worker-service/Dockerfile"

[[build]]
service = "frontend"
builder = "dockerfile"
dockerfile = "frontend/Dockerfile"
